name: RespirIA — Actualitzacio CIMA

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  detectar_novetats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      hi_ha_novetats: ${{ steps.check.outputs.hi_ha_novetats }}
      num_novetats: ${{ steps.check.outputs.num_novetats }}

    steps:
      - name: Descarregar repositori
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instal·lar dependencies
        run: pip install requests openpyxl beautifulsoup4

      - name: Verificar entorn
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== Fitxers al repositori ==="
          ls -la
          echo "=== Test importacions ==="
          python -c "import requests, openpyxl; print('Importacions OK')"
          echo "=== Test lectura Excel ==="
          python -c "import openpyxl; wb=openpyxl.load_workbook('inhaladors_MPOC_ASMA_Avanzado_FINAL.xlsx'); ws=wb.active; print(f'Excel OK: {ws.max_row} files')"

      - name: Executar script — detectar novetats
        id: check
        run: |
          set -x
          python respiria_cima_updater.py --detecta 2>&1
          echo "Exit code: $?"
          if [ -f novetats_count.txt ]; then
            COUNT=$(cat novetats_count.txt)
            echo "Count trobat: $COUNT"
            if [ "$COUNT" -gt "0" ]; then
              echo "hi_ha_novetats=true" >> $GITHUB_OUTPUT
              echo "num_novetats=$COUNT" >> $GITHUB_OUTPUT
            else
              echo "hi_ha_novetats=false" >> $GITHUB_OUTPUT
              echo "num_novetats=0" >> $GITHUB_OUTPUT
            fi
          else
            echo "hi_ha_novetats=false" >> $GITHUB_OUTPUT
            echo "num_novetats=0" >> $GITHUB_OUTPUT
          fi

      - name: Guardar Excel actualitzat
        if: steps.check.outputs.hi_ha_novetats == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add inhaladors_MPOC_ASMA_Avanzado_FINAL.xlsx
          git commit -m "Novetats CIMA: ${{ steps.check.outputs.num_novetats }} nous farmacos pendents de validacio" || echo "Sense canvis"
          git push

      - name: Enviar email — novetats pendents
        if: steps.check.outputs.hi_ha_novetats == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: infermeriap@gmail.com
          from: RespirIA <${{ secrets.GMAIL_USER }}>
          subject: "RespirIA — ${{ steps.check.outputs.num_novetats }} nous inhaladors pendents de validacio"
          body: |
            Hola Silvia,

            El sistema RespirIA ha detectat ${{ steps.check.outputs.num_novetats }} nous inhaladors a la CIMA que necessiten la teva validacio clinica.

            Accedeix a Google Sheets per validar-los:
            https://docs.google.com/spreadsheets/d/${{ secrets.GOOGLE_SHEET_ID }}

            Recorda:
            - Revisa la dosi (columna F)
            - Marca PHF si correspon (columna O)
            - Marca MATMA si correspon (columna P)
            - Quan hagis validat una fila, esborra el text de la columna N

            Els farmacs NO s'incorporaran al prescriptor fins que no els validis.

            Salutacions,
            Sistema RespirIA — ICS Atencio Primaria Girona

  recordatori_setmanal:
    runs-on: ubuntu-latest
    needs: detectar_novetats
    if: needs.detectar_novetats.outputs.hi_ha_novetats == 'false'
    permissions:
      contents: read

    steps:
      - name: Descarregar repositori
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instal·lar dependencies
        run: pip install requests openpyxl beautifulsoup4

      - name: Comprovar pendents antics
        id: pendents
        run: |
          python respiria_cima_updater.py --comprova-pendents
          if [ -f pendents_count.txt ]; then
            COUNT=$(cat pendents_count.txt)
            echo "num_pendents=$COUNT" >> $GITHUB_OUTPUT
            if [ "$COUNT" -gt "0" ]; then
              echo "hi_ha_pendents=true" >> $GITHUB_OUTPUT
            else
              echo "hi_ha_pendents=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "hi_ha_pendents=false" >> $GITHUB_OUTPUT
            echo "num_pendents=0" >> $GITHUB_OUTPUT
          fi

      - name: Enviar recordatori
        if: steps.pendents.outputs.hi_ha_pendents == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: infermeriap@gmail.com
          from: RespirIA <${{ secrets.GMAIL_USER }}>
          subject: "RespirIA — RECORDATORI: ${{ steps.pendents.outputs.num_pendents }} inhaladors pendents de validacio"
          body: |
            Hola Silvia,

            Recordatori: encara tens ${{ steps.pendents.outputs.num_pendents }} inhaladors pendents de validacio clinica.

            Accedeix a Google Sheets per validar-los:
            https://docs.google.com/spreadsheets/d/${{ secrets.GOOGLE_SHEET_ID }}

            Els farmacs NO s'incorporaran al prescriptor fins que no els validis.

            Salutacions,
            Sistema RespirIA — ICS Atencio Primaria Girona

  publicar_si_validat:
    runs-on: ubuntu-latest
    needs: detectar_novetats
    if: needs.detectar_novetats.outputs.hi_ha_novetats == 'false'
    permissions:
      contents: write

    steps:
      - name: Descarregar repositori
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instal·lar dependencies
        run: pip install requests openpyxl beautifulsoup4

      - name: Comprovar si hi ha novetats validades per publicar
        id: publicar
        run: |
          python respiria_cima_updater.py --comprova-publicar
          if [ -f publicar_count.txt ]; then
            COUNT=$(cat publicar_count.txt)
            echo "num_publicar=$COUNT" >> $GITHUB_OUTPUT
            if [ "$COUNT" -gt "0" ]; then
              echo "cal_publicar=true" >> $GITHUB_OUTPUT
            else
              echo "cal_publicar=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "cal_publicar=false" >> $GITHUB_OUTPUT
            echo "num_publicar=0" >> $GITHUB_OUTPUT
          fi

      - name: Regenerar HTML amb farmacs validats
        if: steps.publicar.outputs.cal_publicar == 'true'
        run: python respiria_cima_updater.py --regenera

      - name: Guardar HTML actualitzat
        if: steps.publicar.outputs.cal_publicar == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add RespirIA_v2.html
          git commit -m "Prescriptor actualitzat: ${{ steps.publicar.outputs.num_publicar }} nous farmacs validats incorporats" || echo "Sense canvis"
          git push

      - name: Enviar email — prescriptor actualitzat
        if: steps.publicar.outputs.cal_publicar == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: infermeriap@gmail.com
          from: RespirIA <${{ secrets.GMAIL_USER }}>
          subject: "RespirIA — Prescriptor actualitzat amb ${{ steps.publicar.outputs.num_publicar }} nous farmacs"
          body: |
            Hola Silvia,

            El prescriptor RespirIA s'ha actualitzat automaticament amb ${{ steps.publicar.outputs.num_publicar }} nous farmacs que has validat.

            Accedeix al prescriptor actualitzat:
            https://infermeriap-cpu.github.io/respiria/

            Salutacions,
            Sistema RespirIA — ICS Atencio Primaria Girona
